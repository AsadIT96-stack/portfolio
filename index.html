<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASADIT96 | Cyber Security Learner Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
--brand-color: #00d9ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Fira Code', monospace; background:#000; color:#fff; }

nav {
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid var(--brand-color);
}

.nav-links a { color:var(--brand-color); margin-left:15px; text-decoration:none; }

.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

section { padding:60px 10%; }

.card {
border:1px solid var(--brand-color);
padding:20px;
margin-bottom:10px;
}

input {
width:100%;
padding:10px;
margin-bottom:10px;
background:#001521;
border:1px solid var(--brand-color);
color:#fff;
}

button {
padding:10px;
border:1px solid var(--brand-color);
background:transparent;
color:var(--brand-color);
cursor:pointer;
margin-top:5px;
}

button:hover {
background:var(--brand-color);
color:#000;
}
</style>
</head>

<body>

<nav>
<div>ASADIT96</div>
<div class="nav-links">
<a href="#about">ABOUT</a>
<a href="#projects">PROJECTS</a>
</div>
</nav>

<div class="hero">
<h1>ASADUZZAMAN LIKHON</h1>
<p id="type"></p>
</div>

<section id="about">
<div class="card">
Cyber Security Learner 🔐 | Web Developer 💻
</div>
</section>

<section id="projects">

<!-- LOGIN -->
<div class="card">
<h3>LOGIN</h3>
<input id="accessId" placeholder="ACCESS ID">
<input id="securityKey" type="password" placeholder="SECURITY CODE">
<button id="loginBtn">LOGIN</button>
<p id="status"></p>
</div>

<!-- PASSWORD GENERATOR -->
<div class="card">
<h3>PASSWORD GENERATOR</h3>
<input id="passDisplay" readonly>
<button id="generate-btn">GENERATE</button>
<button id="copy-btn">COPY</button>
</div>

</section>

<script>

/* TYPE EFFECT */
let texts=["ACCESS GRANTED","SYSTEM READY","HIRE ME"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("type");
let cur=texts[i];

j=del?j-1:j+1;
el.textContent=cur.substring(0,j);

if(!del && j===cur.length){del=true;setTimeout(type,1000);}
else if(del && j===0){del=false;i=(i+1)%texts.length;}
setTimeout(type,100);
}
type();

/* LOGIN FIX */
document.getElementById("loginBtn").onclick = function(){
let id=document.getElementById("accessId").value.trim().toLowerCase();
let key=document.getElementById("securityKey").value.trim();
let s=document.getElementById("status");

if(id==="asadit96" && key==="likhon96"){
s.innerText="ACCESS GRANTED";
s.style.color="#00ff88";
}else{
s.innerText="ACCESS DENIED";
s.style.color="red";
}
};

/* PASSWORD GENERATOR FIX */
function generateSecurityKey(length=16){
const chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
let key="";
for(let i=0;i<length;i++){
key+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("passDisplay").value=key;
}

document.getElementById("generate-btn").onclick = generateSecurityKey;

document.getElementById("copy-btn").onclick = function(){
let val=document.getElementById("passDisplay").value;
if(val){
navigator.clipboard.writeText(val);
alert("Copied 🔥");
}
};

</script>

</body>
</html>

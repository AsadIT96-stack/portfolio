<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asaduzzaman Likhon | Cyber Architect</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Orbitron:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--cyan:#00f2ff;
--purple:#bc13fe;
--dark:#050505;
--glass:rgba(255,255,255,0.03);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background: radial-gradient(circle at top,#0a0a0a,#000);
color:#fff;
font-family:'Fira Code',monospace;
overflow-x:hidden;
scroll-behavior:smooth;
cursor:crosshair;
}

/* INTRO */
#intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
.intro-logo{
width:150px;
animation:zoom 2s ease-in-out;
}
@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* PARTICLES */
#particles{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-1;
}

/* NAV */
nav{
position:fixed;width:100%;
padding:20px 10%;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--cyan);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-family:'Orbitron';
color:var(--cyan);
}
.logo-img{
width:40px;
filter: drop-shadow(0 0 10px #00f2ff);
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
margin-top:80px;
}
.hero-logo{
width:120px;
margin-bottom:20px;
filter: drop-shadow(0 0 20px #00f2ff);
}
.hero h1{
font-size:clamp(2rem,8vw,5rem);
background:linear-gradient(90deg,#fff,var(--cyan),var(--purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#typewriter{
color:var(--cyan);
margin-top:20px;
}

/* GRID */
section{padding:120px 10%;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

h2{
color:var(--cyan);
margin-bottom:30px;
border-left:4px solid var(--cyan);
padding-left:10px;
}

.card{
padding:30px;
background:var(--glass);
border-left:3px solid var(--cyan);
backdrop-filter:blur(15px);
transition:all 0.5s ease;
opacity:0;
transform:translateY(50px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 40px rgba(0,242,255,.2);
}

/* BUTTON */
.btn{
margin-top:15px;
padding:10px 20px;
border:1px solid var(--cyan);
color:var(--cyan);
text-decoration:none;
display:inline-block;
margin-right:10px;
transition:.3s;
}
.btn:hover{
background:var(--cyan);
color:#000;
}
.btn:active{
transform:scale(0.95);
}

/* MOBILE */
@media(max-width:768px){
nav{
flex-direction:column;
text-align:center;
}
.hero h1{
font-size:2.5rem;
}
}

footer{
text-align:center;
padding:40px;
color:#444;
}
</style>
</head>

<body>

<!-- INTRO -->

<img src="logo.png" class="intro-logo">
</div>

<canvas id="particles"></canvas>

<nav>
<div class="logo">
<img src="logo.png" class="logo-img">
ASADIT96
</div>
<div>STATUS: <span style="color:#0f0">SECURE</span></div>
</nav>

<div class="hero">
<img src="logo.png" class="hero-logo">
<h1>ASADUZZAMAN LIKHON</h1>
<p id="typewriter"></p>
<a href="#projects" class="btn">ENTER SYSTEM</a>
</div>

<section>
<h2>IDENTITY</h2>
<div class="grid">
<div class="card"><h3>💻 Web Developer</h3></div>
<div class="card"><h3>🔐 Cyber Security</h3></div>
</div>
</section>

<section id="projects">
<h2>PROJECTS</h2>
<div class="grid">
<div class="card"><h3>🔑 Login System</h3></div>
<div class="card"><h3>🌐 Portfolio</h3></div>
<div class="card"><h3>⚡ JS App</h3></div>
</div>
</section>

<section>
<h2>CONTACT</h2>
<div class="card">

<p><i class="fas fa-envelope"></i> likhonzaman96@gmail.com</p>
<p><i class="fas fa-phone"></i> +8801766541452</p>

<a href="https://www.facebook.com/share/1cTzwMDfr1/?mibextid=wwXIfr" class="btn">
<i class="fab fa-facebook"></i> Facebook
</a>

<a href="https://github.com/AsadIT96-stack" class="btn">
<i class="fab fa-github"></i> GitHub

</div>

<footer>
<p>© 2026 ASADIT96 | SYSTEM SECURED</p>
</footer>

<script>
// INTRO HIDE
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},2000);

// TYPEWRITER
const text=["Web Developer_","Cyber Security Learner_","Building ✌️Asduzzaman likhon_"];
let i=0,j=0,del=false;

function type(){
let w=text[i];
document.getElementById("typewriter").innerHTML=w.substring(0,j);

if(!del){
j++;
if(j==w.length) del=true;
}else{
j--;
if(j==0){
del=false;
i=(i+1)%text.length;
}
}

setTimeout(type,del?50:120);
}
type();

// PARTICLES
const c=document.getElementById("particles");
const ctx=c.getContext("2d");

function resizeCanvas(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
speed:0.5+Math.random()
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

particles.forEach(p=>{
ctx.fillStyle="#00f2ff";
ctx.fillRect(p.x,p.y,2,2);

p.y+=p.speed;

if(p.y>c.height){
p.y=0;
p.x=Math.random()*c.width;
}
});

requestAnimationFrame(draw);
}
draw();

// SCROLL REVEAL
const cards=document.querySelectorAll(".card");

function reveal(){
cards.forEach(card=>{
const top=card.getBoundingClientRect().top;

if(top < window.innerHeight - 50){
card.classList.add("show");
}
});
}

window.addEventListener("scroll", reveal);
reveal();
</script>

</body>
</html>

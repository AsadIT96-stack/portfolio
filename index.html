<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

canvas {

/* NAV */
nav {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 8%;
background: rgba(0,0,0,0.9);

.logo {

/* HERO */

display: flex;
flex-direction: column;

/* SECTION */
section { padding: 80px 10%; }

.card {
background: rgba(0,217,255,0.05);
padding: 20px;

.grid {
display: grid;

/* LOGIN */

.input-field input {

.glow-button {

.glow-button:hover {

<script>
/* TYPE */
const texts=["ACCESS GRANTED","SYSTEM READY","HIRE ME"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("type");
let cur=texts[i];

j=del?j-1:j+1;
el.textContent=cur.substring(0,j);

if(!del && j===cur.length){del=true;setTimeout(type,1000);}
else if(del && j===0){del=false;i=(i+1)%texts.length;setTimeout(type,300);}
else{setTimeout(type,del?50:100);}
}

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

let drops,cols;

function resize(){
c.width=innerWidth;
c.height=innerHeight;
cols=Math.floor(c.width/20);
drops=new Array(cols).fill(1);
}
resize();
addEventListener("resize",resize);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00d9ff";

for(let x=0;x<drops.length;x++){
let t=Math.random()>0.5?"0":"1";
ctx.fillText(t,x*20,drops[x]*20);

if(drops[x]*20>c.height && Math.random()>0.975) drops[x]=0;
drops[x]++;
}
}

/* LOGIN FIXED */
document.getElementById("loginForm").addEventListener("submit",function(e){
e.preventDefault();

let id=this[0].value.trim().toLowerCase();
let key=this[1].value.trim();
let s=document.getElementById("status");

s.innerText="AUTHENTICATING...";
s.style.color="#00d9ff";

setTimeout(()=>{
if(id==="asadit96" && key==="likhon96"){
s.innerText="ACCESS GRANTED";
s.style.color="#00ffaa";
}else{
s.innerText="ACCESS DENIED";
s.style.color="red";
}
},1000);

});
function generateSecurityKey(length = 16) {
const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
let key = "";
for (let i = 0; i < length; i++) {
key += chars.charAt(Math.floor(Math.random() * chars.length));
}
return key;
}

function displayKey() {
const key = generateSecurityKey(16);
const display = document.getElementById("passDisplay");
if(display) {
display.value = key;
}
}

  function copyKey() {
const copyText = document.getElementById("passDisplay");
if (copyText && copyText.value !== "" && copyText.value !== "CLICK GENERATE") {
copyText.select();
navigator.clipboard.writeText(copyText.value);
alert("Security Key Copied!");
}
}
setInterval(draw,50);
type();
</script>
